<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模式圖片配對遊戲 (GitHub 題庫整合版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 1200px;
            width: 100%;
            position: relative;
            min-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 通用樣式 --- */
        .hidden-section { display: none !important; }
        .disabled-area { opacity: 0.4; pointer-events: none; }

        /* --- 翻牌網格 (模式0 & 1) --- */
        .card-grid {
            display: grid;
            gap: 10px;
            margin-top: 1.5rem;
            perspective: 1000px;
        }
        .card {
            aspect-ratio: 1 / 1;
            cursor: pointer;
            border-radius: 0.5rem;
            position: relative;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.02); }
        .card-content {
            width: 100%; height: 100%;
            border-radius: 0.5rem;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; background-color: #fff;
            border: 4px solid #e5e7eb;
            transition: border-color 0.2s, box-shadow 0.2s;
            padding: 5px;
        }
        .card-content img { width: 100%; height: 100%; object-fit: contain; }

        /* 翻牌與提示狀態 */
        .card.selected .card-content { border-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .card.hint-target .card-content { border-color: #ec4899; box-shadow: 0 0 15px #ec4899; animation: pulse-hint 1s infinite; }
        .card.matched .card-content { border-color: #10b981; box-shadow: 0 0 15px #10b981; }
        .card.mismatch .card-content { border-color: #ef4444; animation: shake 0.5s; }
        .card.eliminated { opacity: 0; pointer-events: none; }

        /* --- N選1佈局 (模式2, 3, 4) --- */
        .n-choice-container {
            display: flex;
            flex: 1;
            gap: 1.5rem;
            height: 100%;
            margin-top: 1rem;
            min-height: 500px; 
        }
        
        .question-panel {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #aec8fa;
            border-radius: 1rem;
            border: 4px solid #aec8fa;
            padding: 0;
            overflow: hidden;
            position: relative;
        }
        
        .question-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 10;
            pointer-events: none;
        }

        .question-image {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transition: transform 0.3s;
        }
        
        .options-panel {
            flex: 1;
            display: grid;
            gap: 1rem;
            align-content: center;
            max-height: 100%; 
            overflow-y: auto;
            padding: 4px;
        }
        
        .option-card {
            aspect-ratio: 1 / 1;
            cursor: pointer;
            border-radius: 0.75rem;
            border: 3px solid #e2e8f0;
            background: white;
            padding: 0.5rem;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .option-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .option-card img {
            width: 100%; height: 100%; object-fit: contain;
        }
        
        .option-card.hint-target { border-color: #ec4899; box-shadow: 0 0 20px #ec4899; animation: pulse-hint 1s infinite; z-index: 10; }
        .option-card.correct { border-color: #10b981; background-color: #ecfdf5; box-shadow: 0 0 15px #10b981; animation: none; }
        .option-card.wrong { border-color: #ef4444; background-color: #fef2f2; opacity: 0.6; animation: none; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes pulse-hint { 0%, 100% { transform: scale(1); box-shadow: 0 0 15px #ec4899; } 50% { transform: scale(1.05); box-shadow: 0 0 25px #ec4899; } 100% { transform: scale(1); box-shadow: 0 0 15px #ec4899; } }

        .modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            z-index: 200; opacity: 0; visibility: hidden; transition: opacity 0.3s;
        }
        .modal.fixed-modal { position: fixed; }
        .modal.show { opacity: 1; visibility: visible; }
        .modal-content {
            background: white; padding: 2rem; border-radius: 1rem;
            text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        #pause-overlay, #mirror-pause-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="split-layout" class="w-full max-w-[1200px] flex flex-col gap-6 transition-all duration-300">
        
        <div class="game-container flex-1" id="main-container">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-2xl font-bold text-gray-800">多模式配對遊戲</h1>
                <div id="game-controls" class="hidden-section flex items-center gap-3">
                    <div id="timer-display" class="font-mono text-2xl font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg border border-blue-200">
                        00:00
                    </div>
                    <button onclick="togglePause()" class="p-2 rounded-full bg-gray-200 hover:bg-gray-300 transition" title="暫停/繼續 (P)">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="status-display" class="text-center text-gray-600 mb-2 h-6 font-medium"></div>
            
            <div id="upload-section" class="space-y-4 p-6 border border-gray-200 rounded-xl bg-gray-50 flex-1 overflow-y-auto">
                
                <div>
                    <h2 class="text-lg font-bold text-gray-700 mb-3 border-b pb-1">1. 圖片資料來源</h2>
                    
                    <div class="mb-5 p-4 bg-blue-50 border border-blue-200 rounded-lg shadow-sm">
                        <label class="block text-sm text-blue-800 mb-2 font-bold flex items-center gap-2">
                            ☁️ 從 GitHub 題庫載入 <span class="text-xs font-normal text-blue-600 bg-white px-2 py-0.5 rounded-full border border-blue-200">推薦</span>
                        </label>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <select id="github-theme-select" class="flex-1 p-2 border border-blue-300 rounded bg-white text-sm focus:outline-none focus:border-blue-500 font-bold text-gray-700">
                                <option value="">正在連線至 GitHub 讀取檔案...</option>
                            </select>
                            <button onclick="loadFromGithub()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded text-sm transition shadow-sm whitespace-nowrap flex items-center justify-center gap-1">
                                ⬇️ 下載題庫
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex-1">
                            <label class="block text-sm text-gray-600 mb-1 font-medium">上傳本機圖片 (自動生成影子)</label>
                            <input type="file" id="image-files" accept="image/*" multiple class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300 cursor-pointer border rounded-lg bg-white"/>
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm text-gray-600 mb-1 font-medium">匯入舊版設定檔 (.json)</label>
                            <input type="file" id="import-file" accept=".json" onchange="importGameData(event)" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-purple-100 file:text-purple-700 hover:file:bg-purple-200 cursor-pointer border rounded-lg bg-white"/>
                        </div>
                    </div>
                </div>

                <div id="game-settings" class="opacity-50 pointer-events-none transition-opacity duration-300 mt-6">
                    <h2 class="text-lg font-bold text-gray-700 mb-2 border-b pb-1">2. 遊戲設定</h2>
                    
                    <div class="flex flex-wrap gap-3 mb-4">
                        <label class="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded border border-gray-300 hover:bg-blue-50 transition">
                            <input type="radio" name="gameMode" value="memory-original" onchange="toggleModeSettings()" class="form-radio text-blue-600 h-5 w-5">
                            <span class="font-bold text-gray-700">模式0: 翻牌配對 (原圖)</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded border border-gray-300 hover:bg-blue-50 transition">
                            <input type="radio" name="gameMode" value="memory" checked onchange="toggleModeSettings()" class="form-radio text-blue-600 h-5 w-5">
                            <span class="font-bold text-gray-700">模式1: 翻牌配對 (影子)</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded border border-gray-300 hover:bg-blue-50 transition">
                            <input type="radio" name="gameMode" value="n-choice" onchange="toggleModeSettings()" class="form-radio text-blue-600 h-5 w-5">
                            <span class="font-bold text-gray-700">模式2: N選1 測驗 (原圖)</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded border border-gray-300 hover:bg-blue-50 transition">
                            <input type="radio" name="gameMode" value="n-choice-shadow" onchange="toggleModeSettings()" class="form-radio text-blue-600 h-5 w-5">
                            <span class="font-bold text-gray-700">模式3: N選1 影子猜原圖</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded border border-gray-300 hover:bg-blue-50 transition">
                            <input type="radio" name="gameMode" value="n-choice-reverse" onchange="toggleModeSettings()" class="form-radio text-blue-600 h-5 w-5">
                            <span class="font-bold text-gray-700">模式4: N選1 原圖猜影子</span>
                        </label>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-3 rounded-lg border shadow-sm">
                            <label class="block text-sm text-gray-600 mb-1 font-bold">遊戲組數</label>
                            <select id="pair-count-select" class="block w-full p-2 border border-gray-300 rounded bg-gray-50 focus:border-blue-500">
                                <option value="0">請先載入圖片...</option>
                            </select>
                            <p class="text-xs text-gray-400 mt-1">共有 <span id="total-loaded-count">0</span> 張圖片</p>
                        </div>

                        <div id="setting-hint-panel" class="bg-white p-3 rounded-lg border shadow-sm">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600 font-bold">視覺提示 (粉紅框)</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="hint-toggle" class="sr-only peer" onchange="toggleHintSettings()">
                                    <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-pink-500"></div>
                                </label>
                            </div>
                            <div id="hint-delay-wrapper" class="flex items-center justify-between opacity-50 pointer-events-none transition-opacity">
                                <span class="text-xs text-gray-600">延遲(秒):</span>
                                <input type="number" id="hint-delay" value="3" min="0" max="10" step="0.5" class="w-16 p-1 text-sm border rounded text-center">
                            </div>
                        </div>

                        <div id="setting-distractor-panel" class="bg-white p-3 rounded-lg border shadow-sm hidden-section">
                            <label class="block text-sm text-gray-600 mb-1 font-bold">干擾項目數量</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="distractor-count" value="3" min="1" max="5" class="w-full p-2 border border-gray-300 rounded text-center font-bold">
                                <span class="text-sm text-gray-500 whitespace-nowrap">個錯誤選項</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">例如：3個錯誤 = 4選1</p>
                        </div>
                    </div>
                    
                    <div class="mt-4 bg-indigo-50 p-3 rounded-lg border border-indigo-200">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-indigo-800 font-bold">🖥️ 開啟左右分割同步 (台下顯示視角)</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="split-mode-toggle" class="sr-only peer">
                                <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                            </label>
                        </div>
                        <p class="text-xs text-indigo-600 mt-1">開啟後，遊戲畫面將分為左右兩半，右半部為學生觀看的純顯示畫面，方便投放至大螢幕。</p>
                    </div>
                </div>
                
                <div id="upload-status" class="text-sm text-red-500 font-medium h-5 mt-2"></div>
                
                <div class="flex flex-wrap gap-3 mt-4">
                    <button id="start-game-button" onclick="startGame()" disabled
                            class="flex-[2] bg-gray-400 text-white font-bold py-3 px-4 rounded-lg cursor-not-allowed transition duration-200 shadow-md">
                        開始遊戲
                    </button>
                    <button onclick="exportGameData()" id="export-btn" disabled
                            class="flex-1 bg-purple-500 hover:bg-purple-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200">
                        匯出設定檔
                    </button>
                    <button onclick="openDownloadModal()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-4 rounded-lg shadow" title="下載範例">
                        範例
                    </button>
                </div>

                <div id="preview-container" class="grid grid-cols-8 gap-1 mt-4 p-2 border rounded bg-white min-h-[50px]"></div>
            </div>
            
            <div id="game-section" class="hidden-section flex-1 relative min-h-[500px]">
                
                <div id="pause-overlay" class="hidden-section">
                    <h2 class="text-4xl font-bold text-gray-800 mb-4">遊戲暫停</h2>
                    <button onclick="togglePause()" class="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105">
                        繼續
                    </button>
                </div>

                <div id="memory-game-area" class="hidden-section w-full h-full">
                    <div id="card-grid" class="card-grid"></div>
                </div>

                <div id="n-choice-game-area" class="hidden-section w-full h-full">
                    <div class="n-choice-container">
                        <div class="question-panel">
                            <div class="question-label" id="question-label-text">題目</div>
                            <img id="question-img" src="" alt="Question" class="question-image">
                        </div>
                        <div id="options-grid" class="options-panel">
                        </div>
                    </div>
                </div>

                <div class="flex justify-center mt-4 pb-2">
                    <button onclick="showUploadSection()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-full shadow transition">
                        結束並返回
                    </button>
                </div>
            </div>

            <div id="message-box" class="modal">
                <div class="modal-content">
                    <h2 class="text-3xl font-bold text-green-600 mb-2">🎉 挑戰成功！</h2>
                    <p id="win-time-text" class="text-xl text-gray-700 mb-6 font-mono"></p>
                    <button onclick="showUploadSection(); removeShowModal('message-box')" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-8 rounded-full transition">
                        再玩一次
                    </button>
                </div>
            </div>

        </div>

        <div class="game-container flex-1 hidden" id="mirror-container" style="pointer-events: none;">
        </div>

    </div>

    <div id="download-modal" class="modal fixed-modal">
        <div class="modal-content relative">
            <button onclick="document.getElementById('download-modal').classList.remove('show')" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600">✕</button>
            <h2 class="text-xl font-bold text-gray-800 mb-4">下載範例</h2>
            <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
                <a href="https://drive.google.com/drive/folders/17tIiqC53CzjmV3USx6g0DrfNVrojulps?usp=sharing" target="_blank" class="text-blue-600 underline text-lg font-bold">下載</a>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 全域變數與遊戲邏輯
        // ==========================================
        let processedImages = []; 
        let currentMode = 'memory'; 
        
        let gameActive = false;
        let isPaused = false;
        let timerInterval;
        let secondsElapsed = 0;
        let matchesFound = 0;
        let totalRounds = 0;
        let hintTimer = null; 
        let isSplitMode = false;

        let memoryCards = [];
        let selectedCards = [];
        let isProcessingMatch = false;

        let currentQuestionIndex = 0;
        let quizQueue = [];
        let isProcessingQuiz = false;

        const els = {
            uploadSection: document.getElementById('upload-section'),
            gameSection: document.getElementById('game-section'),
            gameSettings: document.getElementById('game-settings'),
            gameControls: document.getElementById('game-controls'),
            pairCountSelect: document.getElementById('pair-count-select'),
            totalLoadedCount: document.getElementById('total-loaded-count'),
            uploadStatus: document.getElementById('upload-status'),
            startGameBtn: document.getElementById('start-game-button'),
            exportBtn: document.getElementById('export-btn'),
            previewContainer: document.getElementById('preview-container'),
            settingHintPanel: document.getElementById('setting-hint-panel'),
            settingDistractorPanel: document.getElementById('setting-distractor-panel'),
            hintToggle: document.getElementById('hint-toggle'),
            hintDelayWrapper: document.getElementById('hint-delay-wrapper'),
            hintDelayInput: document.getElementById('hint-delay'),
            distractorInput: document.getElementById('distractor-count'),
            cardGrid: document.getElementById('card-grid'),
            optionsGrid: document.getElementById('options-grid')
        };

        // --- 同步視圖工具 ---
        function addClasses(el, ...classes) {
            el.classList.add(...classes);
            if(isSplitMode && el.dataset.syncIdx) {
                const mirrorEl = document.querySelector(`#mirror-container [data-sync-idx="${el.dataset.syncIdx}"]`);
                if(mirrorEl) mirrorEl.classList.add(...classes);
            }
        }
        function removeClasses(el, ...classes) {
            el.classList.remove(...classes);
            if(isSplitMode && el.dataset.syncIdx) {
                const mirrorEl = document.querySelector(`#mirror-container [data-sync-idx="${el.dataset.syncIdx}"]`);
                if(mirrorEl) mirrorEl.classList.remove(...classes);
            }
        }
        function setText(baseId, text) {
            const el = document.getElementById(baseId);
            if(el) el.textContent = text;
            if(isSplitMode) {
                const mirrorEl = document.getElementById('mirror-' + baseId);
                if(mirrorEl) mirrorEl.textContent = text;
            }
        }
        function setSrc(baseId, src) {
            const el = document.getElementById(baseId);
            if(el) el.src = src;
            if(isSplitMode) {
                const mirrorEl = document.getElementById('mirror-' + baseId);
                if(mirrorEl) mirrorEl.src = src;
            }
        }
        function showSection(baseId) {
            document.getElementById(baseId)?.classList.remove('hidden-section');
            if(isSplitMode) document.getElementById('mirror-' + baseId)?.classList.remove('hidden-section');
        }
        function hideSection(baseId) {
            document.getElementById(baseId)?.classList.add('hidden-section');
            if(isSplitMode) document.getElementById('mirror-' + baseId)?.classList.add('hidden-section');
        }
        function addShowModal(baseId) {
            document.getElementById(baseId)?.classList.add('show');
            if(isSplitMode) document.getElementById('mirror-' + baseId)?.classList.add('show');
        }
        function removeShowModal(baseId) {
            document.getElementById(baseId)?.classList.remove('show');
            if(isSplitMode) document.getElementById('mirror-' + baseId)?.classList.remove('show');
        }

        function initMirrorDOM() {
            const mirrorWrapper = document.getElementById('mirror-container');
            let topHTML = `
                <div class="flex justify-between items-center mb-2">
                    <h1 class="text-2xl font-bold text-gray-800">投影畫面 (學生視角)</h1>
                    <div id="mirror-game-controls" class="flex items-center gap-3">
                        <div id="mirror-timer-display" class="font-mono text-2xl font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg border border-blue-200">
                            00:00
                        </div>
                    </div>
                </div>
                <div id="mirror-status-display" class="text-center text-gray-600 mb-2 h-6 font-medium"></div>
            `;
            let gameSectionHTML = document.getElementById('game-section').outerHTML;
            gameSectionHTML = gameSectionHTML.replace(/id="([^"]+)"/g, 'id="mirror-$1"');
            let messageBoxHTML = document.getElementById('message-box').outerHTML;
            messageBoxHTML = messageBoxHTML.replace(/id="([^"]+)"/g, 'id="mirror-$1"');

            mirrorWrapper.innerHTML = topHTML + gameSectionHTML + messageBoxHTML;
            const mirrorBtn = mirrorWrapper.querySelector('button[onclick="showUploadSection()"]');
            if(mirrorBtn) mirrorBtn.style.display = 'none';
        }

        // --- 音效 ---
        let synth;
        let audioStarted = false;
        function initAudio() {
            if (audioStarted || typeof Tone === 'undefined') return;
            try {
                synth = new Tone.PolySynth(Tone.Synth).toDestination();
                Tone.start();
                audioStarted = true;
            } catch(e){ console.error(e); }
        }
        function playSound(type) {
            if (!audioStarted) return;
            if(type === 'match') synth.triggerAttackRelease(["C4", "E4", "G4"], "8n");
            if(type === 'correct') synth.triggerAttackRelease(["E4", "G4", "C5"], "8n");
            if(type === 'wrong') { synth.triggerAttackRelease("C3", "16n"); synth.triggerAttackRelease("C#3", "16n", "+0.1"); }
            if(type === 'win') synth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "4n");
        }
        document.body.addEventListener('click', initAudio, { once: true });

        // --- 工具 ---
        function generateShadowImage(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    ctx.globalCompositeOperation = 'source-in';
                    ctx.fillStyle = '#9d4700'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL());
                };
                img.src = base64Str;
            });
        }
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- UI 控制 ---
        function toggleModeSettings() {
            const modes = document.getElementsByName('gameMode');
            for(let m of modes) { if(m.checked) currentMode = m.value; }
            els.settingHintPanel.classList.remove('hidden-section');
            if(currentMode === 'memory' || currentMode === 'memory-original') {
                els.settingDistractorPanel.classList.add('hidden-section');
            } else {
                els.settingDistractorPanel.classList.remove('hidden-section');
            }
        }

        function toggleHintSettings() {
            if(els.hintToggle.checked) els.hintDelayWrapper.classList.remove('opacity-50', 'pointer-events-none');
            else els.hintDelayWrapper.classList.add('opacity-50', 'pointer-events-none');
        }

        function showUploadSection() {
            stopTimer();
            clearTimeout(hintTimer); 
            els.uploadSection.classList.remove('hidden-section');
            hideSection('game-section');
            hideSection('game-controls');
            setText('status-display', "");
            gameActive = false;

            const splitLayout = document.getElementById('split-layout');
            const mirrorContainer = document.getElementById('mirror-container');
            splitLayout.classList.remove('xl:flex-row');
            splitLayout.classList.add('max-w-[1200px]');
            splitLayout.classList.remove('max-w-[2400px]');
            mirrorContainer.classList.add('hidden');
            mirrorContainer.innerHTML = '';
        }

        function updateUIWithData() {
            const count = processedImages.length;
            els.totalLoadedCount.textContent = count;
            
            els.previewContainer.innerHTML = '';
            processedImages.forEach(img => {
                const el = document.createElement('div');
                el.className = 'w-full aspect-square border bg-gray-100 rounded overflow-hidden';
                el.innerHTML = `<img src="${img.original}" class="w-full h-full object-cover">`;
                els.previewContainer.appendChild(el);
            });

            els.pairCountSelect.innerHTML = '';
            if (count > 0) {
                els.gameSettings.classList.remove('opacity-50', 'pointer-events-none');
                for(let i=1; i<=count; i++){
                    const opt = document.createElement('option');
                    opt.value = i; opt.textContent = `${i} 組`;
                    if(i===count) opt.selected = true;
                    els.pairCountSelect.appendChild(opt);
                }
                els.startGameBtn.disabled = false;
                els.startGameBtn.classList.replace('bg-gray-400', 'bg-blue-500');
                els.startGameBtn.classList.remove('cursor-not-allowed');
                els.exportBtn.disabled = false;
            } else {
                els.startGameBtn.disabled = true;
                els.uploadStatus.textContent = "";
            }
        }

        // --- 本地處理 ---
        document.getElementById('image-files').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if(files.length === 0) return;
            els.uploadStatus.textContent = '處理中...';
            els.uploadStatus.classList.replace('text-green-600', 'text-red-500');
            els.startGameBtn.disabled = true;

            const promises = files.map(file => new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const original = evt.target.result;
                    const shadow = await generateShadowImage(original);
                    resolve({ original, shadow, id: Math.random().toString(36).substr(2, 9) });
                };
                reader.readAsDataURL(file);
            }));

            processedImages = await Promise.all(promises);
            updateUIWithData();
            els.uploadStatus.textContent = `✅ 成功讀取 ${processedImages.length} 張本機圖片！`;
            els.uploadStatus.classList.replace('text-red-500', 'text-green-600');
        });

        // --- 遊戲流程 ---
        function startGame() {
            if(processedImages.length === 0) return;
            totalRounds = parseInt(els.pairCountSelect.value);
            
            if (currentMode !== 'memory' && currentMode !== 'memory-original') {
                const distractorCount = parseInt(els.distractorInput.value);
                if (processedImages.length < distractorCount + 1) {
                    alert(`圖片數量不足以產生 ${distractorCount} 個不重複干擾項。\n請上傳更多圖片，或減少干擾數量。`);
                    return;
                }
            }

            isSplitMode = document.getElementById('split-mode-toggle').checked;
            const splitLayout = document.getElementById('split-layout');
            const mirrorContainer = document.getElementById('mirror-container');
            
            if (isSplitMode) {
                initMirrorDOM(); 
                splitLayout.classList.add('xl:flex-row');
                splitLayout.classList.remove('max-w-[1200px]');
                splitLayout.classList.add('max-w-[2400px]');
                mirrorContainer.classList.remove('hidden');
                mirrorContainer.classList.add('flex');
            }

            els.uploadSection.classList.add('hidden-section');
            showSection('game-section');
            showSection('game-controls');
            hideSection('pause-overlay');
            
            matchesFound = 0;
            secondsElapsed = 0;
            setText('timer-display', "00:00");
            gameActive = true;
            isPaused = false;
            clearTimeout(hintTimer);
            startTimer();

            if (currentMode === 'memory' || currentMode === 'memory-original') {
                initMemoryGame();
            } else {
                initNChoiceGame();
            }
        }

        // ==========================================
        // 模式邏輯 (翻牌 & N選1)
        // ==========================================
        function initMemoryGame() {
            showSection('memory-game-area');
            hideSection('n-choice-game-area');
            setText('status-display', `找到 ${matchesFound} / ${totalRounds} 對`);

            memoryCards = [];
            selectedCards = [];
            
            const deck = shuffle([...processedImages]).slice(0, totalRounds);
            
            deck.forEach((imgObj, idx) => {
                if (currentMode === 'memory-original') {
                    memoryCards.push({ id: idx, type: 'original', src: imgObj.original, pairId: imgObj.id });
                    memoryCards.push({ id: idx, type: 'original', src: imgObj.original, pairId: imgObj.id });
                } else {
                    memoryCards.push({ id: idx, type: 'original', src: imgObj.original, pairId: imgObj.id });
                    memoryCards.push({ id: idx, type: 'shadow', src: imgObj.shadow, pairId: imgObj.id });
                }
            });
            
            shuffle(memoryCards);
            renderMemoryGrid();
        }

        function renderMemoryGrid() {
            els.cardGrid.innerHTML = '';
            let mirrorGrid = null;
            if(isSplitMode) {
                mirrorGrid = document.getElementById('mirror-card-grid');
                if(mirrorGrid) mirrorGrid.innerHTML = '';
            }

            let cols = 4;
            if(memoryCards.length > 12) cols = 5;
            if(memoryCards.length > 20) cols = 6;
            
            els.cardGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            if(mirrorGrid) mirrorGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            memoryCards.forEach((card, index) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.dataset.idx = index;
                el.dataset.syncIdx = `mem-${index}`; 
                el.innerHTML = `<div class="card-content"><img src="${card.src}"></div>`;
                el.onclick = () => handleMemoryClick(el, card);
                els.cardGrid.appendChild(el);

                if(mirrorGrid) {
                    const clone = el.cloneNode(true);
                    mirrorGrid.appendChild(clone);
                }
            });
        }

        function handleMemoryClick(el, card) {
            if(isPaused || isProcessingMatch || el.classList.contains('selected') || el.classList.contains('eliminated')) return;

            addClasses(el, 'selected');
            selectedCards.push({ el, card });

            if(selectedCards.length === 1 && els.hintToggle.checked) {
                const delay = parseFloat(els.hintDelayInput.value) * 1000;
                clearTimeout(hintTimer);
                hintTimer = setTimeout(() => {
                    if(selectedCards.length === 1 && gameActive && !isPaused) {
                        const targetPair = selectedCards[0].card.pairId;
                        document.querySelectorAll('#main-container .card').forEach(c => {
                            const cIdx = c.dataset.idx;
                            if(!c.classList.contains('eliminated') && c !== el && memoryCards[cIdx].pairId === targetPair) {
                                addClasses(c, 'hint-target');
                            }
                        });
                    }
                }, delay);
            }

            if(selectedCards.length === 2) {
                isProcessingMatch = true;
                clearTimeout(hintTimer);
                document.querySelectorAll('#main-container .hint-target').forEach(c => removeClasses(c, 'hint-target'));

                const [c1, c2] = selectedCards;
                const match = c1.card.pairId === c2.card.pairId;

                if(match) {
                    addClasses(c1.el, 'matched'); addClasses(c2.el, 'matched');
                    playSound('match');
                    setTimeout(() => {
                        addClasses(c1.el, 'eliminated'); addClasses(c2.el, 'eliminated');
                        matchesFound++;
                        setText('status-display', `找到 ${matchesFound} / ${totalRounds} 對`);
                        checkWin();
                        selectedCards = [];
                        isProcessingMatch = false;
                    }, 500);
                } else {
                    addClasses(c1.el, 'mismatch'); addClasses(c2.el, 'mismatch');
                    playSound('wrong');
                    setTimeout(() => {
                        removeClasses(c1.el, 'selected', 'matched', 'mismatch');
                        removeClasses(c2.el, 'selected', 'matched', 'mismatch');
                        selectedCards = [];
                        isProcessingMatch = false;
                    }, 800);
                }
            }
        }

        function initNChoiceGame() {
            hideSection('memory-game-area');
            showSection('n-choice-game-area');
            quizQueue = shuffle([...processedImages]).slice(0, totalRounds);
            currentQuestionIndex = 0;
            isProcessingQuiz = false;
            renderQuizRound();
        }

        function renderQuizRound() {
            if(currentQuestionIndex >= totalRounds) { gameWin(); return; }
            clearTimeout(hintTimer); 
            setText('status-display', `第 ${currentQuestionIndex + 1} 題 / 共 ${totalRounds} 題`);

            const targetObj = quizQueue[currentQuestionIndex];
            if (currentMode === 'n-choice-shadow') {
                setSrc('question-img', targetObj.shadow);
                setText('question-label-text', "請找出此影子的原圖");
            } else if (currentMode === 'n-choice-reverse') {
                setSrc('question-img', targetObj.original);
                setText('question-label-text', "請找出此圖片的影子");
            } else {
                setSrc('question-img', targetObj.original);
                setText('question-label-text', "請找出相同的圖片");
            }

            const distractorCount = parseInt(els.distractorInput.value);
            const pool = processedImages.filter(img => img.id !== targetObj.id);
            const distractors = shuffle(pool).slice(0, distractorCount);
            
            let correctSrc, distractorSrcFn;
            if (currentMode === 'n-choice-reverse') {
                correctSrc = targetObj.shadow; distractorSrcFn = (d) => d.shadow;
            } else {
                correctSrc = targetObj.original; distractorSrcFn = (d) => d.original;
            }
            
            let options = [
                { src: correctSrc, isCorrect: true, id: targetObj.id },
                ...distractors.map(d => ({ src: distractorSrcFn(d), isCorrect: false, id: d.id }))
            ];
            options = shuffle(options);

            els.optionsGrid.innerHTML = '';
            let mirrorGrid = null;
            if(isSplitMode) {
                mirrorGrid = document.getElementById('mirror-options-grid');
                if(mirrorGrid) mirrorGrid.innerHTML = '';
            }

            const totalOps = options.length;
            let gridClass = "grid-cols-2";
            if(totalOps > 4) gridClass = "grid-cols-3";
            
            els.optionsGrid.className = `options-panel grid ${gridClass} gap-4`;
            if(mirrorGrid) mirrorGrid.className = `options-panel grid ${gridClass} gap-4`;

            options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option-card';
                btn.dataset.isCorrect = opt.isCorrect;
                btn.dataset.syncIdx = `quiz-${index}`; 
                btn.innerHTML = `<img src="${opt.src}">`;
                btn.onclick = () => handleOptionClick(btn, opt);
                els.optionsGrid.appendChild(btn);

                if(mirrorGrid) {
                    const clone = btn.cloneNode(true);
                    mirrorGrid.appendChild(clone);
                }
            });

            if (els.hintToggle.checked) {
                const delay = parseFloat(els.hintDelayInput.value) * 1000;
                hintTimer = setTimeout(() => {
                    if (!isProcessingQuiz && gameActive && !isPaused) {
                        const correctBtn = Array.from(els.optionsGrid.children).find(b => b.dataset.isCorrect === 'true');
                        if (correctBtn) addClasses(correctBtn, 'hint-target');
                    }
                }, delay);
            }
        }

        function handleOptionClick(btn, opt) {
            if(isPaused || isProcessingQuiz) return;
            if(btn.classList.contains('correct') || btn.classList.contains('wrong')) return;

            clearTimeout(hintTimer);
            document.querySelectorAll('#main-container .hint-target').forEach(el => removeClasses(el, 'hint-target'));

            if(opt.isCorrect) {
                isProcessingQuiz = true;
                addClasses(btn, 'correct');
                playSound('correct');
                setTimeout(() => {
                    currentQuestionIndex++;
                    isProcessingQuiz = false;
                    renderQuizRound();
                }, 1000);
            } else {
                addClasses(btn, 'wrong');
                playSound('wrong');
            }
        }

        function checkWin() { if(matchesFound === totalRounds) gameWin(); }
        function gameWin() {
            stopTimer(); clearTimeout(hintTimer); playSound('win');
            setText('win-time-text', `耗時：${document.getElementById('timer-display').textContent}`);
            addShowModal('message-box');
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!isPaused) {
                    secondsElapsed++;
                    const m = Math.floor(secondsElapsed / 60).toString().padStart(2,'0');
                    const s = (secondsElapsed % 60).toString().padStart(2,'0');
                    setText('timer-display', `${m}:${s}`);
                }
            }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); }
        function togglePause() {
            if(!gameActive) return;
            isPaused = !isPaused;
            if(isPaused) { showSection('pause-overlay'); clearTimeout(hintTimer); } 
            else { hideSection('pause-overlay'); }
        }

        function openDownloadModal() { document.getElementById('download-modal').classList.add('show'); }
        function exportGameData() {
            if(processedImages.length === 0) return;
            const blob = new Blob([JSON.stringify(processedImages)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `game_data_${new Date().getTime()}.json`;
            a.click();
        }
        function importGameData(e) {
            const file = e.target.files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = (evt) => {
                try {
                    const data = JSON.parse(evt.target.result);
                    if(Array.isArray(data) && data[0].original) {
                        processedImages = data;
                        updateUIWithData();
                        els.uploadStatus.textContent = "✅ JSON 匯入成功！";
                        els.uploadStatus.classList.replace('text-red-500', 'text-green-600');
                    }
                } catch(err) { alert('格式錯誤'); }
            };
            r.readAsText(file);
        }

        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'p' && gameActive) togglePause();
        });

        // ==========================================
        // GitHub 雲端題庫整合邏輯
        // ==========================================
        const githubRepoUrl = "https://api.github.com/repos/tpectim/matchsp/contents/";

        async function initGithubThemes() {
            const selectEl = document.getElementById('github-theme-select');
            try {
                // 向 GitHub API 請求目錄資訊
                const response = await fetch(githubRepoUrl);
                if (!response.ok) throw new Error("無法讀取 GitHub 儲存庫");
                
                const files = await response.json();
                
                // 過濾出 .json 檔案
                const jsonFiles = files.filter(file => file.type === 'file' && file.name.endsWith('.json'));

                if (jsonFiles.length === 0) {
                    selectEl.innerHTML = '<option value="">找不到任何 JSON 題庫檔案</option>';
                    return;
                }

                selectEl.innerHTML = '<option value="">請選擇題庫檔案...</option>';
                jsonFiles.forEach(file => {
                    const option = document.createElement('option');
                    // 將真實的下載網址綁定在 value 內
                    option.value = file.download_url;
                    // 將檔名當作選項顯示文字 (並稍微修飾去掉 .json 後綴)
                    const displayName = file.name.replace('.json', '');
                    option.textContent = `📄 ${displayName}`;
                    selectEl.appendChild(option);
                });
            } catch (error) {
                console.error("連線 GitHub 失敗:", error);
                selectEl.innerHTML = '<option value="">連線失敗，請檢查網路</option>';
            }
        }

        async function loadFromGithub() {
            const selectEl = document.getElementById('github-theme-select');
            const downloadUrl = selectEl.value;
            const selectedText = selectEl.options[selectEl.selectedIndex].text;
            
            if (!downloadUrl) {
                alert("請先選擇一個題庫檔案！");
                return;
            }
            
            els.uploadStatus.textContent = `☁️ 正在從 GitHub 下載 ${selectedText}，請稍候...`;
            els.uploadStatus.classList.replace('text-green-600', 'text-gray-600');
            els.startGameBtn.disabled = true;
            
            try {
                const response = await fetch(downloadUrl);
                if (!response.ok) throw new Error("下載失敗");
                
                const data = await response.json();
                
                // 簡易防呆檢查：是否為陣列且包含 original 屬性
                if (!Array.isArray(data) || data.length === 0 || !data[0].original) {
                    throw new Error("JSON 格式不符 (缺少 original 欄位)");
                }

                els.uploadStatus.textContent = `🔄 下載完成，正在即時運算 ${data.length} 張圖片的影子...`;
                
                // 處理並自動補齊缺失的屬性 (包含產生影子)
                const promises = data.map(async (docData) => {
                    let shadow = docData.shadow;
                    // 如果 JSON 中沒有預先建立好影子圖，在此生成
                    if (!shadow) {
                        shadow = await generateShadowImage(docData.original);
                    }
                    return {
                        id: docData.id || Math.random().toString(36).substr(2, 9),
                        original: docData.original,
                        shadow: shadow,
                        name: docData.name || "未命名",
                        theme: docData.theme || selectedText
                    };
                });
                
                processedImages = await Promise.all(promises);
                
                // 更新畫面 UI
                updateUIWithData();
                els.uploadStatus.textContent = `✅ 成功載入 ${processedImages.length} 張圖片！`;
                els.uploadStatus.classList.replace('text-gray-600', 'text-green-600');
                
            } catch (error) {
                console.error("下載失敗:", error);
                els.uploadStatus.textContent = `❌ 下載失敗：${error.message}`;
                els.uploadStatus.classList.replace('text-gray-600', 'text-red-500');
            }
        }

        // 畫面載入時改為初始化 GitHub 清單
        window.addEventListener('DOMContentLoaded', initGithubThemes);

    </script>
</body>
</html>
